<!--
  Masterminds gallery include
  ---------------------------
  Place this snippet wherever you want to show a small gallery of
  past community/online‑event screenshots.  It uses Bulma's column
  grid so the images can have different natural sizes and still flow
  nicely on mobile.

  To add or change pictures simply swap the `src` values below or
  move the `<div class="column ...">` blocks around.  There are
  five placeholder images, but you can remove/add columns as needed.
-->

<section class="section community-gallery">
  <div class="container">
    <h2 class="title is-4 has-text-white">Monthly Round Table</h2>

    <div class="columns is-multiline is-mobile">
      <!-- large/landscape image -->
      <div class="column is-half-tablet is-full-mobile">
        <figure class="image">
          <img src="/assets/img/event1.png" alt="Event 1">
        </figure>
      </div>

      <!-- tall/portrait image -->
      <div class="column is-half-tablet is-full-mobile">
        <figure class="image">
          <img src="/assets/img/event2.png" alt="Event 2">
        </figure>
      </div>

      <!-- square or medium-size picture -->
      <div class="column is-one-third-desktop is-half-tablet is-full-mobile">
        <figure class="image">
          <img src="/assets/img/event3.png" alt="Event 3">
        </figure>
      </div>

      <!-- another medium picture -->
      <div class="column is-one-third-desktop is-half-tablet is-full-mobile">
        <figure class="image">
          <img src="/assets/img/event4.png" alt="Event 4">
        </figure>
      </div>

      <!-- small/thumbnail image -->
      <div class="column is-one-third-desktop is-half-tablet is-full-mobile">
        <figure class="image">
          <img src="/assets/img/event5.png" alt="Event 5">
        </figure>
      </div>
    </div>
  </div>
</section>
